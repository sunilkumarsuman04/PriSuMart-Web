<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PriSuMart — Fresh Groceries Delivered Fast</title>
    <meta
      name="description"
      content="PriSuMart delivers fresh fruits, vegetables, dairy, snacks and household essentials to your doorstep in 30–40 minutes. Download the app — coming soon to Play Store and App Store."
    />
    <meta name="keywords" content="PriSuMart, grocery delivery, online grocery, fast delivery, fresh groceries, instant delivery app, quick commerce, grocery app India" />
    <meta name="author" content="PriSuMart" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.prisumart.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#2E8B3D" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.prisumart.com/" />
    <meta property="og:title" content="PriSuMart — Fresh Groceries Delivered Fast" />
    <meta
      property="og:description"
      content="Fresh fruits, vegetables, dairy & daily essentials delivered to your doorstep in 30–40 minutes. PriSuMart — Fresh Items, Happy Homes."
    />
    <meta property="og:image" content="https://www.prisumart.com/og-image.png" />
    <meta property="og:site_name" content="PriSuMart" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PriSuMart — Fresh Groceries Delivered Fast" />
    <meta
      name="twitter:description"
      content="Fresh groceries delivered to your doorstep in 30–40 minutes. Download the PriSuMart app — coming soon."
    />
    <meta name="twitter:image" content="https://www.prisumart.com/og-image.png" />

    <!-- Fonts: Sora (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "PriSuMart",
        "url": "https://www.prisumart.com",
        "logo": "https://www.prisumart.com/logo.png",
        "description": "PriSuMart is a grocery delivery platform offering fresh fruits, vegetables, dairy, snacks and household essentials with fast doorstep delivery.",
        "sameAs": []
      }
    </script>

    <!-- Structured Data: MobileApplication (placeholder, update once live) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MobileApplication",
        "name": "PriSuMart",
        "operatingSystem": "ANDROID, IOS",
        "applicationCategory": "ShoppingApplication",
        "offers": {
          "@type": "Offer",
          "price": "0"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
